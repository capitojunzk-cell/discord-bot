<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon AI Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#14001f,#2b0040,#14001f);
overflow:hidden;
}

/* animated background glow */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:
radial-gradient(circle at 20% 30%, rgba(255,0,255,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,105,180,0.25), transparent 40%);
animation:moveBg 12s infinite alternate ease-in-out;
}

@keyframes moveBg{
0%{transform:translate(-10%,-10%)}
100%{transform:translate(10%,10%)}
}

.chat-container{
width:420px;
height:620px;
backdrop-filter:blur(25px);
background:rgba(255,255,255,0.05);
border-radius:30px;
box-shadow:0 0 40px #ff00ff88;
padding:20px;
display:flex;
flex-direction:column;
z-index:2;
position:relative;
}

.messages{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:15px;
padding-right:5px;
}

/* bubbles */
.bubble{
padding:14px 20px;
border-radius:35px;
max-width:75%;
animation:pop .4s ease;
word-wrap:break-word;
}

@keyframes pop{
0%{transform:scale(.7);opacity:0}
100%{transform:scale(1);opacity:1}
}

.user{
align-self:flex-end;
background:linear-gradient(45deg,#ff00ff,#ff69b4);
color:white;
box-shadow:0 0 15px #ff00ff;
}

.ai{
align-self:flex-start;
background:linear-gradient(45deg,#6a00ff,#ff00ff);
color:white;
box-shadow:0 0 15px #b300ff;
}

/* typing dots */
.typing{
display:flex;
gap:5px;
}

.typing span{
width:8px;
height:8px;
background:white;
border-radius:50%;
animation:blink 1.4s infinite both;
}

.typing span:nth-child(2){
animation-delay:.2s;
}
.typing span:nth-child(3){
animation-delay:.4s;
}

@keyframes blink{
0%{opacity:.2}
20%{opacity:1}
100%{opacity:.2}
}

.chat-image{
margin-top:10px;
width:100%;
border-radius:20px;
box-shadow:0 0 25px #ff00ff;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

/* fake input */
.input-area{
margin-top:15px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px 18px;
border-radius:35px;
border:none;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
}

button{
padding:12px 20px;
border-radius:35px;
border:none;
cursor:pointer;
background:linear-gradient(45deg,#ff00ff,#ff69b4);
color:white;
box-shadow:0 0 15px #ff00ff;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 30px #ff69b4;
}
</style>
</head>

<body>

<div class="chat-container">
<div class="messages" id="chat">

<div class="bubble user">
Hi, can you create a SpongeBob-themed logo and put my name "Rynzhyr Proof"?
</div>

<div class="bubble ai" id="typing">
<div class="typing">
<span></span><span></span><span></span>
</div>
</div>

</div>

<div class="input-area">
<input type="text" placeholder="Type a message..." disabled>
<button disabled>Send</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");
const typing = document.getElementById("typing");

setTimeout(() => {
typing.remove();

const aiMessage = document.createElement("div");
aiMessage.className = "bubble ai";
aiMessage.innerHTML = 'Here is the image you requested.<br><img src="rynzhyr.png" class="chat-image">';
chat.appendChild(aiMessage);

chat.scrollTop = chat.scrollHeight;

}, 3000);
</script>

</body>
</html>
